<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>STAR ROUTE - Retro Space Shooter</title>
  <style>
    :root {
      --bg: #02040a;
      --panel: rgba(4, 12, 24, 0.9);
      --line: rgba(247, 201, 107, 0.54);
      --text: #f8fbff;
      --muted: rgba(174, 220, 255, 0.74);
      --cyan: #6ff1ff;
      --gold: #f7c96b;
      --red: #ff496d;
      --pink: #ff2fb3;
      --blue: #168dff;
      --violet: #a65cff;
      --green: #70ff9c;
      --ink: #070916;
    }

    * { box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 22% 18%, rgba(22, 141, 255, 0.24), transparent 26%),
        radial-gradient(circle at 82% 24%, rgba(255, 47, 179, 0.18), transparent 25%),
        radial-gradient(circle at 52% 82%, rgba(247, 201, 107, 0.12), transparent 33%),
        linear-gradient(135deg, #01030a 0%, #06101f 45%, #03040a 100%),
        var(--bg);
      color: var(--text);
      font-family: "Segoe UI", Inter, "Noto Sans JP", system-ui, sans-serif;
      touch-action: none;
      letter-spacing: 0;
    }

    button { border: 0; font: inherit; cursor: pointer; }
    .app {
      width: 100%;
      height: 100%;
      min-height: 520px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: 16px;
      gap: 12px;
      position: relative;
      border: 1px solid rgba(22, 141, 255, 0.25);
      background:
        linear-gradient(90deg, rgba(111, 241, 255, 0.06) 1px, transparent 1px),
        linear-gradient(rgba(111, 241, 255, 0.035) 1px, transparent 1px),
        radial-gradient(circle at 50% 0%, rgba(111, 241, 255, 0.13), transparent 28%),
        rgba(0, 0, 0, 0.18);
      background-size: 42px 42px, 42px 42px, 100% 100%, 100% 100%;
      box-shadow:
        inset 0 0 140px rgba(22, 141, 255, 0.12),
        inset 0 0 32px rgba(247, 201, 107, 0.07);
    }

    .app::before,
    .app::after {
      content: "";
      position: absolute;
      left: 18px;
      right: 18px;
      height: 14px;
      pointer-events: none;
      background:
        linear-gradient(90deg, transparent 0 8%, var(--blue) 8% 12%, transparent 12% 43%, rgba(247,201,107,.9) 43% 57%, transparent 57% 88%, var(--blue) 88% 92%, transparent 92%),
        linear-gradient(90deg, transparent, rgba(111,241,255,.58), transparent);
      filter: drop-shadow(0 0 10px rgba(22,141,255,.85));
      opacity: .85;
    }

    .app::before { top: 8px; }
    .app::after { bottom: 8px; transform: scaleY(-1); }

    .topbar, .screen, .meter-item, .touch button, .pad {
      clip-path: polygon(12px 0, calc(100% - 26px) 0, 100% 26px, 100% calc(100% - 12px), calc(100% - 12px) 100%, 26px 100%, 0 calc(100% - 26px), 0 12px);
    }

    .topbar {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 14px;
      z-index: 3;
      padding: 18px;
      border: 1px solid rgba(111, 241, 255, 0.32);
      background:
        linear-gradient(135deg, rgba(8, 18, 32, 0.96), rgba(3, 8, 16, 0.92)),
        repeating-linear-gradient(135deg, rgba(255,255,255,.04) 0 1px, transparent 1px 10px);
      box-shadow:
        0 0 0 1px rgba(247, 201, 107, 0.18),
        0 0 42px rgba(22, 141, 255, 0.18),
        inset 0 0 52px rgba(111, 241, 255, 0.07);
    }

    .hud {
      min-height: 86px;
      padding: 16px 18px;
      position: relative;
      border: 1px solid rgba(111, 241, 255, 0.52);
      border-radius: 0;
      background:
        linear-gradient(180deg, rgba(120, 211, 255, 0.12), transparent 46%),
        linear-gradient(135deg, rgba(2, 16, 34, 0.95), rgba(1, 5, 12, 0.9)),
        var(--panel);
      box-shadow:
        inset 0 0 0 2px rgba(247, 201, 107, 0.16),
        inset 0 0 30px rgba(22, 141, 255, 0.15),
        0 0 22px rgba(22, 141, 255, 0.22);
      clip-path: polygon(14px 0, calc(100% - 18px) 0, 100% 18px, 100% calc(100% - 14px), calc(100% - 14px) 100%, 18px 100%, 0 calc(100% - 18px), 0 14px);
    }

    .hud::before {
      content: "";
      position: absolute;
      inset: 5px;
      border: 1px solid rgba(22, 141, 255, 0.58);
      clip-path: inherit;
      pointer-events: none;
      box-shadow: inset 0 0 16px rgba(111, 241, 255, 0.15);
    }

    .hud::after {
      content: "";
      position: absolute;
      left: 22px;
      right: 22px;
      bottom: 7px;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--blue), var(--gold), transparent);
      box-shadow: 0 0 10px rgba(111, 241, 255, 0.75);
    }

    .hud span {
      display: block;
      color: #82d9ff;
      font-size: 15px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-shadow: 0 0 12px rgba(111, 241, 255, 0.75);
    }

    .hud strong {
      display: block;
      margin-top: 10px;
      font-size: clamp(28px, 4.6vw, 46px);
      line-height: 1;
      font-variant-numeric: tabular-nums;
      color: #ffd77b;
      text-shadow:
        0 0 8px rgba(247, 201, 107, 0.9),
        0 0 28px rgba(255, 120, 64, 0.48);
    }

    .sound {
      min-height: 86px;
      border-radius: 0;
      border: 1px solid rgba(111, 241, 255, 0.44);
      background:
        linear-gradient(180deg, rgba(112,255,156,.13), transparent 45%),
        linear-gradient(135deg, rgba(4, 32, 28, .95), rgba(2, 11, 18, .92));
      color: var(--green);
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 2px;
      text-shadow: 0 0 18px rgba(112, 255, 156, 0.9);
      box-shadow:
        inset 0 0 0 2px rgba(112, 255, 156, 0.14),
        0 0 26px rgba(112, 255, 156, 0.18);
    }

    .sound.on {
      border-color: rgba(112, 255, 156, 0.66);
      color: var(--green);
    }

    .screen-wrap {
      position: relative;
      min-height: 0;
      display: grid;
      place-items: center;
      padding: 14px;
      border: 1px solid rgba(22, 141, 255, 0.28);
      background:
        linear-gradient(90deg, transparent 0 20%, rgba(247,201,107,.45) 20% 23%, transparent 23% 77%, rgba(247,201,107,.45) 77% 80%, transparent 80%),
        linear-gradient(180deg, rgba(111,241,255,.08), transparent 22%, transparent 78%, rgba(111,241,255,.08));
      box-shadow: inset 0 0 42px rgba(0,0,0,.55);
      clip-path: polygon(22px 0, calc(100% - 42px) 0, 100% 42px, 100% calc(100% - 22px), calc(100% - 22px) 100%, 42px 100%, 0 calc(100% - 42px), 0 22px);
    }

    .screen {
      position: relative;
      width: min(100%, calc((100vh - 170px) * 16 / 9));
      max-width: 960px;
      aspect-ratio: 16 / 9;
      border: 2px solid rgba(111, 241, 255, 0.78);
      border-radius: 0;
      background: linear-gradient(135deg, #02030a, #080c17);
      overflow: hidden;
      box-shadow:
        0 0 0 5px rgba(247, 201, 107, 0.22),
        0 0 0 9px rgba(3, 13, 28, 0.96),
        0 0 42px rgba(22, 141, 255, 0.66),
        0 0 80px rgba(255, 47, 179, 0.16),
        inset 0 0 90px rgba(111, 241, 255, 0.12);
    }

    .screen::before,
    .screen::after {
      content: "";
      position: absolute;
      z-index: 2;
      pointer-events: none;
      inset: 8px;
      border: 1px solid rgba(247, 201, 107, 0.34);
      clip-path: polygon(30px 0, calc(100% - 30px) 0, 100% 30px, 100% calc(100% - 30px), calc(100% - 30px) 100%, 30px 100%, 0 calc(100% - 30px), 0 30px);
      box-shadow: inset 0 0 18px rgba(247, 201, 107, 0.16);
    }

    .screen::after {
      inset: 0;
      border: 0;
      background:
        linear-gradient(90deg, rgba(111,241,255,.9), transparent 10%, transparent 90%, rgba(255,47,179,.78)),
        linear-gradient(180deg, rgba(247,201,107,.8), transparent 9%, transparent 91%, rgba(111,241,255,.85));
      opacity: .18;
      mix-blend-mode: screen;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
    }

    .crt {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
        linear-gradient(90deg, transparent, rgba(247,201,107,0.04), transparent),
        radial-gradient(ellipse at center, transparent 52%, rgba(0,0,0,0.38));
      background-size: 100% 4px, 240px 100%, 100% 100%;
      mix-blend-mode: screen;
      opacity: 0.58;
    }

    .meter {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 12px;
      z-index: 3;
    }

    .meter-item {
      min-height: 92px;
      display: grid;
      grid-template-rows: auto 1fr;
      place-items: center;
      gap: 8px;
      position: relative;
      border-radius: 0;
      border: 1px solid rgba(247, 201, 107, 0.42);
      background:
        linear-gradient(180deg, rgba(111,241,255,.12), transparent 44%),
        linear-gradient(135deg, rgba(9, 22, 40, 0.95), rgba(3, 6, 14, 0.94));
      color: #9edfff;
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 1px;
      text-shadow: 0 0 12px rgba(111, 241, 255, 0.55);
      box-shadow:
        inset 0 0 0 3px rgba(22, 141, 255, 0.12),
        inset 0 -16px 28px rgba(0,0,0,.38),
        0 0 22px rgba(22, 141, 255, 0.13);
    }

    .meter-icon {
      width: 58%;
      min-width: 36px;
      aspect-ratio: 1.55;
      display: grid;
      place-items: center;
      margin-top: 4px;
      color: var(--cyan);
      font-size: clamp(22px, 4vw, 36px);
      border: 1px solid rgba(111, 241, 255, .16);
      background:
        repeating-linear-gradient(135deg, rgba(255,255,255,.04) 0 2px, transparent 2px 8px),
        rgba(0,0,0,.28);
      box-shadow: inset 0 0 18px rgba(111, 241, 255, 0.1);
    }

    .meter-item.selected {
      color: var(--ink);
      border-color: rgba(255, 213, 106, 0.78);
      background:
        linear-gradient(180deg, rgba(255,255,255,.2), transparent 40%),
        linear-gradient(135deg, #ffe19a, var(--gold), #ff5ea8);
      box-shadow:
        0 0 28px rgba(255, 213, 106, 0.52),
        0 0 42px rgba(255, 47, 179, 0.25),
        inset 0 0 20px rgba(255,255,255,0.18);
    }

    .meter-item.selected .meter-icon {
      color: #04111d;
      border-color: rgba(0,0,0,.24);
      background: rgba(255,255,255,.28);
    }

    .meter-item.active {
      color: var(--green);
      border-color: rgba(112, 255, 156, 0.32);
    }

    .touch {
      display: none;
      grid-template-columns: 1.08fr 0.96fr 0.96fr;
      gap: 16px;
      z-index: 4;
    }

    .pad {
      width: min(34vw, 176px);
      aspect-ratio: 1;
      justify-self: center;
      align-self: center;
      position: relative;
      border-radius: 999px;
      border: 1px solid rgba(247, 201, 107, 0.52);
      background:
        radial-gradient(circle at 50% 50%, rgba(0,0,0,.1) 0 32%, transparent 33%),
        conic-gradient(from 0deg, rgba(22,141,255,.9), rgba(111,241,255,.16), rgba(247,201,107,.8), rgba(22,141,255,.9)),
        radial-gradient(circle at 50% 50%, rgba(10, 37, 68, .94), rgba(0,0,0,.9) 72%);
      box-shadow:
        inset 0 0 32px rgba(0,0,0,0.58),
        0 18px 40px rgba(0,0,0,0.42),
        0 0 34px rgba(22, 141, 255, 0.36);
      touch-action: none;
      clip-path: none;
    }

    .pad::before {
      content: "";
      position: absolute;
      inset: 18%;
      border-radius: 999px;
      border: 1px solid rgba(111,241,255,0.38);
      background:
        radial-gradient(circle, rgba(111,241,255,.14), transparent 56%),
        conic-gradient(from 45deg, transparent 0 22%, rgba(247,201,107,.78) 23% 25%, transparent 26% 47%, rgba(111,241,255,.8) 48% 50%, transparent 51% 72%, rgba(247,201,107,.78) 73% 75%, transparent 76%);
      box-shadow: inset 0 0 26px rgba(111, 241, 255, 0.16);
    }

    .pad::after {
      content: "";
      position: absolute;
      inset: 8%;
      border-radius: 999px;
      border: 2px solid rgba(22, 141, 255, 0.45);
      box-shadow: 0 0 24px rgba(22,141,255,.55);
      pointer-events: none;
    }

    .stick {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 44%;
      aspect-ratio: 1;
      border-radius: 999px;
      transform: translate(-50%, -50%);
      border: 1px solid rgba(255,255,255,0.36);
      background:
        radial-gradient(circle at 35% 26%, rgba(255,255,255,0.78), transparent 20%),
        radial-gradient(circle at 50% 60%, #04111f, #000 72%);
      box-shadow:
        inset 0 -10px 22px rgba(0,0,0,0.72),
        0 12px 28px rgba(0,0,0,0.44),
        0 0 28px rgba(22, 141, 255, 0.44);
      pointer-events: none;
    }

    .touch button {
      min-height: 128px;
      border-radius: 0;
      border: 1px solid rgba(111, 241, 255, 0.45);
      color: #020712;
      font-weight: 900;
      font-size: clamp(22px, 6vw, 40px);
      letter-spacing: 1px;
      position: relative;
      overflow: hidden;
      text-shadow: 0 2px 0 rgba(255,255,255,.22);
      box-shadow:
        inset 0 0 0 5px rgba(255,255,255,.1),
        inset 0 0 30px rgba(255,255,255,.16),
        0 0 34px rgba(22, 141, 255, 0.25);
    }

    .touch button::before {
      content: "";
      position: absolute;
      inset: 8px;
      border: 1px solid rgba(255,255,255,.28);
      pointer-events: none;
      clip-path: inherit;
    }

    .touch button::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(255,255,255,.28), transparent 28%, transparent 72%, rgba(255,255,255,.16)),
        repeating-linear-gradient(135deg, rgba(255,255,255,.05) 0 2px, transparent 2px 10px);
      pointer-events: none;
    }

    .touch .shot { background: linear-gradient(135deg, #33eaff, #60ffd3, #0eb8d6); }
    .touch .power {
      background: linear-gradient(135deg, #ff7ada, #ff2fb3, #8b37ff);
      box-shadow:
        inset 0 0 0 5px rgba(255,255,255,.1),
        inset 0 0 36px rgba(255,255,255,.16),
        0 0 38px rgba(255, 47, 179, 0.38);
    }

    @media (max-width: 760px) {
      .app { padding: 10px; grid-template-rows: auto 1fr auto auto; gap: 10px; }
      .topbar { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .topbar { padding: 14px; gap: 10px; }
      .hud { min-height: 74px; padding: 12px; }
      .hud span { font-size: 12px; }
      .hud strong { font-size: 28px; }
      .screen { width: 100%; }
      .screen-wrap { padding: 10px; }
      .meter { gap: 7px; }
      .meter-item { min-height: 80px; font-size: 10px; }
      .meter-icon { font-size: 24px; }
      .touch { display: grid; }
      .sound { min-height: 74px; font-size: 19px; }
      .touch button { min-height: 116px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="topbar" aria-label="status">
      <div class="hud"><span>SCORE</span><strong id="score">0</strong></div>
      <div class="hud"><span>HI-SCORE</span><strong id="hi">0</strong></div>
      <div class="hud"><span>LIVES</span><strong id="lives">3</strong></div>
      <div class="hud"><span>STAGE</span><strong id="stageText">1</strong></div>
      <button class="sound" id="soundBtn">SOUND OFF</button>
    </section>

    <section class="screen-wrap">
      <div class="screen" id="screen">
        <canvas id="game" width="960" height="540" aria-label="STAR ROUTE game"></canvas>
        <div class="crt"></div>
      </div>
    </section>

    <section class="meter" id="meter" aria-label="power meter"></section>

    <section class="touch" aria-label="mobile controls">
      <div class="pad" id="slidePad" aria-label="slide pad">
        <div class="stick" id="stick"></div>
      </div>
      <button class="shot" id="touchShot">SHOT</button>
      <button class="power" id="touchPower">POWER</button>
    </section>
  </main>

  <script>
    const W = 960, H = 540, GAME_H = 486;
    const POWER = ['SPEED', 'MISSILE', 'DOUBLE', 'LASER', 'OPTION', 'SHIELD'];
    const POWER_ICONS = ['>>', '◆', '○○', '✦', '⚙', '▣'];
    const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
    const hitCircle = (a, b) => {
      const dx = a.x - b.x, dy = a.y - b.y;
      const r = (a.r || 10) + (b.r || 10);
      return dx * dx + dy * dy < r * r;
    };
    const hitRect = (a, b) => (
      a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y
    );

    class AudioManager {
      constructor(button) {
        this.button = button;
        this.ctx = null;
        this.master = null;
        this.loop = null;
        this.step = 0;
      }
      init() {
        const AC = window.AudioContext || window.webkitAudioContext;
        if (!AC) return false;
        if (!this.ctx) {
          this.ctx = new AC();
          this.master = this.ctx.createGain();
          this.master.gain.value = 0.26;
          this.master.connect(this.ctx.destination);
        }
        if (this.ctx.state === 'suspended') this.ctx.resume();
        return true;
      }
      tone(freq, dur, type = 'square', vol = 0.06, slide = 0) {
        if (!this.init()) return;
        const now = this.ctx.currentTime;
        const o = this.ctx.createOscillator();
        const g = this.ctx.createGain();
        o.type = type;
        o.frequency.setValueAtTime(freq, now);
        if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(20, slide), now + dur);
        g.gain.setValueAtTime(0.0001, now);
        g.gain.exponentialRampToValueAtTime(vol, now + 0.01);
        g.gain.exponentialRampToValueAtTime(0.0001, now + dur);
        o.connect(g); g.connect(this.master);
        o.start(now); o.stop(now + dur + 0.03);
      }
      noise(dur = 0.2, vol = 0.06) {
        if (!this.init()) return;
        const buffer = this.ctx.createBuffer(1, this.ctx.sampleRate * dur, this.ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
        const src = this.ctx.createBufferSource();
        const filter = this.ctx.createBiquadFilter();
        const g = this.ctx.createGain();
        filter.type = 'bandpass';
        filter.frequency.value = 850;
        g.gain.value = vol;
        src.buffer = buffer;
        src.connect(filter); filter.connect(g); g.connect(this.master);
        src.start();
      }
      start() {
        if (!this.init()) {
          this.button.textContent = 'NO AUDIO';
          return false;
        }
        if (this.loop) return true;
        const bass = [82,82,0,123,82,0,147,0,98,98,0,165,98,0,147,0];
        const lead = [659,784,880,988,880,784,740,659,523,587,659,740,659,587,523,494];
        const alarm = [1318,0,1174,0,988,0,1174,0];
        const tick = () => {
          const b = bass[this.step % bass.length];
          const l = lead[this.step % lead.length];
          const a = alarm[this.step % alarm.length];
          if (b) this.tone(b, 0.105, 'sawtooth', 0.07, b * 0.72);
          if (this.step % 2 === 0) this.tone(l, 0.06, 'square', 0.045, l * 1.18);
          if (a && this.step % 8 === 0) this.tone(a, 0.055, 'triangle', 0.032, a * 0.82);
          if (this.step % 4 === 2) this.noise(0.035, 0.018);
          this.step++;
        };
        tick();
        this.loop = setInterval(tick, 104);
        this.update();
        return true;
      }
      stop() {
        if (this.loop) clearInterval(this.loop);
        this.loop = null;
        this.update();
      }
      toggle() { this.loop ? this.stop() : this.start(); }
      update() {
        this.button.textContent = this.loop ? 'SOUND ON' : 'SOUND OFF';
        this.button.classList.toggle('on', !!this.loop);
      }
      shot(laser = false) { laser ? this.tone(720, .16, 'sawtooth', .07, 180) : this.tone(760, .06, 'square', .06, 420); }
      cannon() { this.tone(92, .28, 'sawtooth', .11, 48); this.tone(520, .22, 'square', .08, 180); this.noise(.2, .06); }
      capsule() { this.tone(620, .07, 'triangle', .06); this.tone(940, .08, 'triangle', .05); }
      power() { [420, 630, 840, 1260].forEach((n, i) => setTimeout(() => this.tone(n, .07, 'square', .05), i * 55)); }
      boom(big = false) { this.tone(big ? 90 : 150, big ? .45 : .2, 'sawtooth', big ? .1 : .07, 45); this.noise(big ? .45 : .22, big ? .1 : .07); }
      damage() { this.tone(180, .16, 'square', .09, 70); this.noise(.18, .08); }
      clear() { [523,659,784,1046,1318].forEach((n, i) => setTimeout(() => this.tone(n, .13, 'triangle', .06), i * 110)); }
    }

    class Bullet {
      constructor(x, y, vx, vy, team, kind = 'shot') {
        Object.assign(this, { x, y, vx, vy, team, kind, dead: false });
        this.r = kind === 'enemyLaser' ? 16 : kind === 'cannon' ? 26 : kind === 'laser' ? 9 : kind === 'missile' ? 7 : 5;
        this.w = kind === 'cannon' ? 420 : kind === 'enemyLaser' ? 210 : kind === 'laser' ? 154 : 14;
        this.h = kind === 'cannon' ? 46 : kind === 'enemyLaser' ? 18 : kind === 'laser' ? 9 : 8;
        this.life = kind === 'cannon' ? 0.9 : kind === 'enemyLaser' ? 0.62 : kind === 'laser' ? 0.42 : 3.8;
        this.pierce = kind === 'laser' || kind === 'cannon' || kind === 'enemyLaser';
      }
      update(dt) {
        this.life -= dt;

    class Enemy {
      constructor(type, x, y, group = null) {

          laser: [22, 4, 520],
          mid: [26, 8, 800],

          turret: [16, 2, 300],

    class Boss {

      }

    class Game {
      constructor() {
        this.canvas = document.getElementById('game');

        this.input = { x: 0, y: 0, shot: false };

        this.state = 'title'; this.score = 0; this.hi = Number(localStorage.getItem('starRouteHi') || 0);
        this.elapsed = 0; this.scroll = 0; this.scrollSpeed = 135; this.spawn = 0; this.meter = -1; this.groupSeq = 1;
        this.message = 'STAR ROUTE'; this.messageTime = 0; this.last = 0; this.clearBonus = 0;

        this.updateHud();

      bind() {

        window.addEventListener('keydown', e => {
          if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)) e.preventDefault();
          if (e.code === 'Enter') this.start();
          if (e.code === 'KeyP' && this.state === 'playing') this.state = 'pause'; else if (e.code === 'KeyP' && this.state === 'pause') this.state = 'playing';
          if (e.code === 'KeyX') this.activatePowerButton();
          if (e.code === 'Space') this.input.shot = true;
          this.setKey(e.code, true);
        });
        window.addEventListener('keyup', e => { if (e.code === 'Space') this.input.shot = false; this.setKey(e.code, false); });
        document.getElementById('touchShot').onpointerdown = () => this.input.shot = true;
        document.getElementById('touchShot').onpointerup = () => this.input.shot = false;
        document.getElementById('touchPower').onclick = () => this.activatePowerButton();
        this.bindSlidePad();
        document.getElementById('screen').addEventListener('pointerdown', e => { if (this.state !== 'playing') this.start(); else this.input.shot = true; });
        document.getElementById('screen').addEventListener('pointerup', () => this.input.shot = false);
      }
      bindSlidePad() {
        const pad = document.getElementById('slidePad');
        const stick = document.getElementById('stick');
        const reset = () => {
          this.input.x = 0; this.input.y = 0;

        };
        const move = e => {
          if (this.padPointer !== null && e.pointerId !== this.padPointer) return;
          const r = pad.getBoundingClientRect();

          let dx = e.clientX - cx;
          let dy = e.clientY - cy;
          const len = Math.hypot(dx, dy);

        this.keys[code] = down;
        this.input.x = (this.keys.ArrowRight || this.keys.KeyD ? 1 : 0) - (this.keys.ArrowLeft || this.keys.KeyA ? 1 : 0);
        this.input.y = (this.keys.ArrowDown || this.keys.KeyS ? 1 : 0) - (this.keys.ArrowUp || this.keys.KeyW ? 1 : 0);
      }
      start() {
        if (this.state === 'playing') return;
        this.audio.start();
        this.player.resetAll();
        Object.assign(this, { state:'playing', score:0, elapsed:0, scroll:0, spawn:0, waveCount:0, bullets:[], enemies:[], particles:[], capsules:[], boss:null, meter:-1, clearBonus:0 });
        this.seenEnemies = new Set();
        this.seenBullets = new Set();
        this.flash('STAGE 1', 2.2);
        this.updateHud();
        this.renderMeter();
      }
      flash(text, time = 1.3) { this.message = text; this.messageTime = time; }
      phase() { return this.boss ? 4 : this.elapsed < 35 ? 1 : this.elapsed < 75 ? 2 : this.elapsed < 110 ? 3 : 4; }
      terrainY(x) {
        const p = this.phase();
        if (p === 2) {
          const v = Math.sin((x + this.scroll) * .012) * 34 + Math.sin((x + this.scroll) * .026) * 15;
          return { top: 68 + v, bottom: GAME_H - 72 + v * .45 };
        }
        if (p === 3) {
          const gate = Math.sin((x + this.scroll) * .018) > .48 ? 70 : 0;
          return { top: 88 + gate, bottom: GAME_H - 90 - gate };
        }
        return null;
      }
      update(dt) {
        if (this.state !== 'playing') return;
        this.elapsed += dt; this.scroll += this.scrollSpeed * dt; this.messageTime = Math.max(0, this.messageTime - dt);
        if (this.phase() === 4 && !this.boss) { this.boss = new Boss(); this.flash('WARNING!! CORE GUARDIAN', 2.4); }
        if (!this.boss) this.spawnWave(dt); else this.boss.update(dt, this);
        this.player.update(dt);
        const ter = this.terrainY(this.player.x);
        if (ter && (this.player.y < ter.top + 16 || this.player.y > ter.bottom - 16)) this.player.damage();
        for (const a of [this.bullets, this.enemies, this.capsules, this.particles]) for (const o of a) o.update(dt, this);
        for (const e of this.enemies) this.seenEnemies.add(e.type);
        for (const b of this.bullets) this.seenBullets.add(b.kind);
        this.collisions();
        this.cleanup();
        this.updateHud();
      }
      spawnWave(dt) {
        this.spawn -= dt;
        if (this.spawn > 0) return;
        const p = this.phase();
        this.spawn = Math.max(.42, 1.0 - this.elapsed * .006);
        this.waveCount = (this.waveCount || 0) + 1;
        if (p === 1) {
          const r = Math.random();
          if (this.waveCount % 5 === 0) this.enemies.push(new Enemy('laser', W+40, 80 + Math.random()*320));
          else if (this.waveCount % 3 === 0) this.addDartRush();
          else if (r < .42) this.addFormation();
          else if (r < .68) this.addDartRush();
          else if (r < .86) this.enemies.push(new Enemy('laser', W+40, 80 + Math.random()*320));
          else {
            this.enemies.push(new Enemy('runner', W+30, 60 + Math.random()*330));
            if (Math.random() < .45) this.enemies.push(new Enemy('runner', W+86, 80 + Math.random()*290));
          }
        } else if (p === 2) {
          if (this.waveCount % 4 === 0) { this.addHeavyEscort(); return; }
          const type = Math.random() < .38 ? 'turretLaser' : Math.random() < .72 ? 'turret' : 'float';
          this.enemies.push(new Enemy(type, W+30, Math.random()<.5 ? 100 : GAME_H-95));
          if (Math.random()<.45) this.addFormation();
          if (Math.random()<.18) this.addHeavyEscort();
        } else {
          if (this.waveCount % 3 === 0) { this.addHeavyEscort(); return; }
          const r = Math.random();
          if (r < .28) this.addHeavyEscort();
          else if (r < .58) this.enemies.push(new Enemy('laser', W+40, 95 + Math.random()*280));
          else this.enemies.push(new Enemy(Math.random()<.45?'mid':'float', W+40, 95 + Math.random()*280));
          if (Math.random()<.48) this.enemies.push(new Enemy(Math.random()<.5?'turretLaser':'turret', W+60, Math.random()<.5 ? 96 : GAME_H-96));
          if (Math.random()<.2) this.addDartRush();
        }
      }
      addFormation() {
        const group = this.groupSeq++, y = 80 + Math.random() * 300;
        for (let i = 0; i < 7; i++) this.enemies.push(new Enemy('wave', W + i * 38, y + Math.sin(i * .9) * 28, group));
      }
      addDartRush() {
        const y = 70 + Math.random() * 340;
        for (let i = 0; i < 4; i++) this.enemies.push(new Enemy('dart', W + i * 52, y + (i % 2 ? 26 : -26), this.groupSeq++));
      }
      addHeavyEscort() {
        const y = 125 + Math.random() * 240;
        this.enemies.push(new Enemy('heavy', W + 90, y));
        this.enemies.push(new Enemy('laser', W + 148, clamp(y - 72, 64, GAME_H - 64)));
        this.enemies.push(new Enemy('laser', W + 148, clamp(y + 72, 64, GAME_H - 64)));
      }
      collisions() {
        for (const b of this.bullets) {
          if (b.team === 'player') {
            for (const e of this.enemies) {
              const beamHit = b.kind === 'laser' || b.kind === 'cannon';
              if (!e.dead && (beamHit ? hitRect({x:b.x,y:b.y-b.h/2,w:b.w,h:b.h}, {x:e.x-e.r,y:e.y-e.r,w:e.r*2,h:e.r*2}) : hitCircle(b,e))) {
                e.hp--; this.explode(b.x, b.y, '#6ff1ff', false); if (!b.pierce) b.dead = true;
                if (e.hp <= 0) this.killEnemy(e);
              }
            }
            if (this.boss && !this.boss.dead && this.boss.hit(b, this) && !b.pierce) b.dead = true;
          } else {
            const laserHit = b.kind === 'enemyLaser'
              ? hitRect({x:b.x-b.w,y:b.y-b.h/2,w:b.w,h:b.h}, {x:this.player.x-12,y:this.player.y-12,w:24,h:24})
              : hitCircle(b, this.player);
            if (laserHit) { b.dead = true; this.player.damage(); }
          }
        }
        for (const e of this.enemies) if (!e.dead && hitCircle(e, this.player)) { e.dead = true; this.player.damage(); }
        for (const c of this.capsules) if (!c.dead && hitCircle(c, this.player)) { c.dead = true; this.meter = (this.meter + 1) % POWER.length; this.audio.capsule(); this.renderMeter(); }
      }
      killEnemy(e) {
        const big = e.type === 'mid' || e.type === 'heavy' || e.type === 'laser';
        e.dead = true; this.score += e.score; this.explode(e.x, e.y, e.type==='mid'?'#ff496d':'#ffd56a', big); this.audio.boom(big);
        if (Math.random() < (e.group ? .32 : .16)) this.capsules.push(new PowerCapsule(e.x, e.y));
      }
      confirmPower() {
        if (this.state !== 'playing' || this.meter < 0) return;
        const name = POWER[this.meter]; this.player.applyPower(name); this.meter = -1; this.audio.power(); this.flash(name, .8); this.renderMeter();
      }
      activatePowerButton() {
        if (this.state !== 'playing') return;
        if (this.meter >= 0) this.confirmPower();
        this.player.firePowerCannon();
      }
      explode(x,y,color,big=false) { for (let i=0;i<(big?28:10);i++) this.particles.push(new Particle(x,y,color,big)); }
      cleanup() {
        this.bullets = this.bullets.filter(o => !o.dead);
        this.enemies = this.enemies.filter(o => !o.dead);
        this.capsules = this.capsules.filter(o => !o.dead);
        this.particles = this.particles.filter(o => o.life > 0);
      }
      gameOver() { this.state = 'gameover'; this.audio.boom(true); this.saveHi(); this.flash('GAME OVER', 999); }
      clear() { if (this.state !== 'playing') return; this.clearBonus = this.player.lives * 1000; this.score += this.clearBonus; this.state = 'clear'; this.saveHi(); this.flash('STAGE CLEAR', 999); }
      saveHi() { this.hi = Math.max(this.hi, this.score); localStorage.setItem('starRouteHi', String(this.hi)); this.updateHud(); }
      updateHud() {
        document.getElementById('score').textContent = this.score;
        document.getElementById('hi').textContent = this.hi;
        document.getElementById('lives').textContent = Math.max(0, this.player.lives);
        document.getElementById('stageText').textContent = this.phase();
        document.getElementById('screen').dataset.state = this.state;
        document.getElementById('screen').dataset.bullets = this.bullets.map(b => b.kind).join(',');
        document.getElementById('screen').dataset.enemies = this.enemies.map(e => e.type).join(',');
        document.getElementById('screen').dataset.seenEnemies = [...(this.seenEnemies || [])].join(',');
        document.getElementById('screen').dataset.seenBullets = [...(this.seenBullets || [])].join(',');
        document.getElementById('screen').dataset.input = `${this.input.x.toFixed(2)},${this.input.y.toFixed(2)}`;
      }
      renderMeter() {
        document.getElementById('meter').innerHTML = POWER.map((p,i) => `<div class="meter-item ${i===this.meter?'selected':''} ${this.isActive(p)?'active':''}"><span>${p}</span><span class="meter-icon">${POWER_ICONS[i]}</span></div>`).join('');
      }
      isActive(p) {
        return (p==='SPEED'&&this.player.speedLevel>0)||(p==='MISSILE'&&this.player.missile)||(p==='DOUBLE'&&this.player.weapon==='double')||(p==='LASER'&&this.player.weapon==='laser')||(p==='OPTION'&&this.player.optionCount>0)||(p==='SHIELD'&&this.player.shield>0);
      }
      drawBackground(ctx) {
        const bg = ctx.createLinearGradient(0, 0, W, H);
        bg.addColorStop(0, '#020713');
        bg.addColorStop(.45, '#061021');
        bg.addColorStop(1, '#02030a');
        ctx.fillStyle = bg; ctx.fillRect(0,0,W,H);
        const nebulaA = ctx.createRadialGradient(W * .74, H * .28, 10, W * .74, H * .28, 340);
        nebulaA.addColorStop(0, 'rgba(22,141,255,.34)');
        nebulaA.addColorStop(.45, 'rgba(12,50,130,.14)');
        nebulaA.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = nebulaA; ctx.fillRect(0,0,W,H);
        const nebulaB = ctx.createRadialGradient(W * .20, H * .82, 10, W * .20, H * .82, 270);
        nebulaB.addColorStop(0, 'rgba(255,47,179,.28)');
        nebulaB.addColorStop(.46, 'rgba(76,18,120,.13)');
        nebulaB.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = nebulaB; ctx.fillRect(0,0,W,H);
        ctx.strokeStyle = 'rgba(111,241,255,.06)';
        ctx.lineWidth = 1;
        for (let y = 0; y < GAME_H; y += 24) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }
        for (let x = 0; x < W; x += 48) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, GAME_H); ctx.stroke(); }
        for (let layer=0;layer<3;layer++) {
          const speed = [0.18,0.42,0.75][layer], count = [58,42,30][layer];
          ctx.fillStyle = layer===0 ? 'rgba(111,241,255,.32)' : layer===1 ? 'rgba(255,213,106,.38)' : 'rgba(255,255,255,.58)';
          for (let i=0;i<count;i++) {
            const x = (i*223 - this.scroll*speed) % (W+80);
            const y = (i*i*47 + layer*80) % GAME_H;
            ctx.fillRect(x<0?x+W+80:x, y, layer+1, layer+1);
          }
        }
        ctx.save();
        ctx.lineCap = 'round';
        for (let i = 0; i < 18; i++) {
          const x = (i * 311 - this.scroll * (1.6 + (i % 3) * .3)) % (W + 260);
          const y = (i * i * 37 + 40) % GAME_H;
          const sx = x < -220 ? x + W + 260 : x;
          ctx.strokeStyle = i % 3 === 0 ? 'rgba(255,47,179,.55)' : 'rgba(111,241,255,.62)';
          ctx.lineWidth = i % 3 === 0 ? 2 : 1;
          ctx.beginPath(); ctx.moveTo(sx, y); ctx.lineTo(sx + 74 + (i % 4) * 22, y - 14); ctx.stroke();
        }
        ctx.restore();
        ctx.save();
        ctx.fillStyle = 'rgba(22, 28, 44, .86)';
        ctx.strokeStyle = 'rgba(111, 241, 255, .22)';
        for (const rock of [{x:64,y:72,s:28},{x:76,y:410,s:34},{x:760,y:458,s:24}]) {
          const rx = (rock.x - this.scroll * .22) % (W + 100);
          const x = rx < -60 ? rx + W + 100 : rx;
          ctx.beginPath();
          ctx.moveTo(x - rock.s, rock.y);
          ctx.lineTo(x - rock.s * .35, rock.y - rock.s * .75);
          ctx.lineTo(x + rock.s * .62, rock.y - rock.s * .45);
          ctx.lineTo(x + rock.s, rock.y + rock.s * .18);
          ctx.lineTo(x + rock.s * .26, rock.y + rock.s * .72);
          ctx.closePath();
          ctx.fill(); ctx.stroke();
        }
        ctx.restore();
      }
      drawTerrain(ctx) {
        const p = this.phase(); if (p < 2 || p > 3 || this.boss) return;
        ctx.fillStyle = p === 2 ? '#36131a' : '#202a39'; ctx.strokeStyle = p === 2 ? '#ff496d' : '#6ff1ff'; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(0,0);
        for (let x=0;x<=W;x+=12) ctx.lineTo(x,this.terrainY(x).top);
        ctx.lineTo(W,0); ctx.closePath(); ctx.fill(); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0,H);
        for (let x=0;x<=W;x+=12) ctx.lineTo(x,this.terrainY(x).bottom);
        ctx.lineTo(W,H); ctx.closePath(); ctx.fill(); ctx.stroke();
      }
      drawOverlay(ctx) {
        ctx.textAlign='center';
        if (this.state === 'title') {
          ctx.fillStyle='rgba(0,0,0,.52)'; ctx.fillRect(0,0,W,H);
          ctx.strokeStyle='rgba(247,201,107,.55)'; ctx.lineWidth=2;
          ctx.strokeRect(W/2-300, 128, 600, 172);
          ctx.strokeStyle='rgba(111,241,255,.22)'; ctx.strokeRect(W/2-286, 142, 572, 144);
          ctx.shadowColor='rgba(247,201,107,.45)'; ctx.shadowBlur=24;
          ctx.fillStyle='#fff7df'; ctx.font='900 74px system-ui'; ctx.fillText('STAR ROUTE', W/2, 194);
          ctx.shadowColor='rgba(111,241,255,.6)'; ctx.shadowBlur=18;
          ctx.fillStyle='#6ff1ff'; ctx.font='800 22px system-ui'; ctx.fillText('RETRO HORIZONTAL SHOOTER', W/2, 234);
          ctx.shadowBlur=0;
          ctx.fillStyle='#f7c96b'; ctx.font='900 18px system-ui'; ctx.fillText('Press Enter / Tap Start', W/2, 294);
          ctx.fillStyle='rgba(238,248,255,.78)'; ctx.font='14px system-ui'; ctx.fillText('Move: Arrow/WASD  Shot: Space  Power: X  Pause: P', W/2, 330);
          ctx.fillText('This is an original retro shooter inspired by classic arcade design.', W/2, 360);
        }
        if (this.state === 'pause') { ctx.fillStyle='rgba(0,0,0,.5)'; ctx.fillRect(0,0,W,H); ctx.fillStyle='#ffd56a'; ctx.font='900 54px system-ui'; ctx.fillText('PAUSE', W/2, H/2); }
        if (this.state === 'gameover' || this.state === 'clear') {
          ctx.fillStyle='rgba(0,0,0,.55)'; ctx.fillRect(0,0,W,H);
          ctx.fillStyle=this.state==='clear'?'#70ff9c':'#ff496d'; ctx.font='900 62px system-ui'; ctx.fillText(this.state==='clear'?'STAGE CLEAR':'GAME OVER', W/2, 205);
          ctx.fillStyle='#eef8ff'; ctx.font='800 24px system-ui'; ctx.fillText(`SCORE ${this.score}   HI ${this.hi}`, W/2, 260);
          if (this.state === 'clear') ctx.fillText(`BONUS ${this.clearBonus}`, W/2, 296);
          ctx.fillStyle='#ffd56a'; ctx.font='800 18px system-ui'; ctx.fillText('Press Enter / Tap Screen to Play Again', W/2, 344);
        }
        if (this.messageTime > 0 && this.state === 'playing') {
          ctx.save();
          ctx.shadowColor = this.message.includes('WARNING') ? '#ff496d' : '#a65cff';
          ctx.shadowBlur = 28;
          ctx.fillStyle = this.message.includes('WARNING') ? 'rgba(255,73,109,.16)' : 'rgba(166,92,255,.18)';
          ctx.beginPath();
          ctx.moveTo(W/2, 66);
          ctx.lineTo(W/2 + 34, 102);
          ctx.lineTo(W/2, 138);
          ctx.lineTo(W/2 - 34, 102);
          ctx.closePath();
          ctx.fill();
          ctx.strokeStyle = this.message.includes('WARNING') ? '#ff496d' : '#f7c96b';
          ctx.lineWidth = 2;
          ctx.beginPath(); ctx.moveTo(W/2 - 180, 102); ctx.lineTo(W/2 - 52, 102); ctx.moveTo(W/2 + 52, 102); ctx.lineTo(W/2 + 180, 102); ctx.stroke();
          ctx.fillStyle = this.message.includes('WARNING') ? '#ff496d' : '#ffd56a';
          ctx.font='900 34px system-ui'; ctx.fillText(this.message, W/2, 112);
          ctx.restore();
        }
      }
      draw() {
        const ctx = this.ctx; ctx.clearRect(0,0,W,H); this.drawBackground(ctx); this.drawTerrain(ctx);
        for (const c of this.capsules) c.draw(ctx);
        for (const b of this.bullets) b.draw(ctx);
        for (const e of this.enemies) e.draw(ctx);
        if (this.boss && !this.boss.dead) this.boss.draw(ctx);
        this.player.draw(ctx);
        for (const p of this.particles) p.draw(ctx);
        ctx.globalAlpha = 1; this.drawOverlay(ctx);
      }
      loop(t) {
        const dt = Math.min(.033, (t - this.last) / 1000 || 0); this.last = t;
        this.update(dt); this.draw(); requestAnimationFrame(n => this.loop(n));
      }
    }
    new Game();
  </script>
</body>
