<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>STAR ROUTE - Retro Space Shooter</title>
  <style>
    :root {
      --bg: #03050d;
      --panel: rgba(9, 13, 26, 0.88);
      --line: rgba(226, 188, 96, 0.34);
      --text: #f8fbff;
      --muted: rgba(248, 251, 255, 0.66);
      --cyan: #6ff1ff;
      --gold: #f7c96b;
      --red: #ff496d;
      --green: #70ff9c;
      --ink: #070916;
    }

    * { box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 14% 12%, rgba(111, 241, 255, 0.16), transparent 28%),
        radial-gradient(circle at 82% 16%, rgba(247, 201, 107, 0.13), transparent 27%),
        radial-gradient(circle at 78% 86%, rgba(255, 73, 109, 0.14), transparent 30%),
        linear-gradient(135deg, #03050d 0%, #090d18 44%, #04050a 100%),
        var(--bg);
      color: var(--text);
      font-family: Inter, "Noto Sans JP", system-ui, sans-serif;
      touch-action: none;
      letter-spacing: 0;
    }

    button { border: 0; font: inherit; cursor: pointer; }
    .app {
      width: 100%;
      height: 100%;
      min-height: 520px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: 10px;
      gap: 8px;
      border: 1px solid rgba(247, 201, 107, 0.1);
      box-shadow: inset 0 0 110px rgba(111, 241, 255, 0.045);
    }

    .topbar {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
      z-index: 3;
    }

    .hud {
      min-height: 54px;
      padding: 9px 11px;
      border: 1px solid rgba(247, 201, 107, 0.22);
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.08), transparent 44%),
        linear-gradient(135deg, rgba(247, 201, 107, 0.09), rgba(111, 241, 255, 0.05)),
        var(--panel);
      box-shadow: inset 0 0 28px rgba(111, 241, 255, 0.05), 0 12px 30px rgba(0,0,0,0.28);
    }

    .hud span {
      display: block;
      color: var(--muted);
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .hud strong {
      display: block;
      margin-top: 4px;
      font-size: 18px;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      color: #fff7df;
      text-shadow: 0 0 16px rgba(247, 201, 107, 0.28);
    }

    .sound {
      min-height: 54px;
      border-radius: 8px;
      border: 1px solid rgba(247, 201, 107, 0.28);
      background: linear-gradient(135deg, rgba(247, 201, 107, 0.14), rgba(111, 241, 255, 0.07));
      color: var(--gold);
      font-size: 12px;
      font-weight: 900;
      box-shadow: 0 14px 30px rgba(0,0,0,0.28), inset 0 0 20px rgba(255,255,255,0.04);
    }

    .sound.on {
      border-color: rgba(112, 255, 156, 0.46);
      color: var(--green);
    }

    .screen-wrap {
      position: relative;
      min-height: 0;
      display: grid;
      place-items: center;
    }

    .screen {
      position: relative;
      width: min(100%, calc((100vh - 170px) * 16 / 9));
      max-width: 960px;
      aspect-ratio: 16 / 9;
      border: 1px solid rgba(247, 201, 107, 0.34);
      border-radius: 8px;
      background: linear-gradient(135deg, #02030a, #080c17);
      overflow: hidden;
      box-shadow:
        0 26px 90px rgba(0, 0, 0, 0.52),
        0 0 0 1px rgba(255,255,255,0.04),
        0 0 34px rgba(247, 201, 107, 0.12),
        inset 0 0 90px rgba(111, 241, 255, 0.08);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
    }

    .crt {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
        linear-gradient(90deg, transparent, rgba(247,201,107,0.04), transparent),
        radial-gradient(ellipse at center, transparent 52%, rgba(0,0,0,0.38));
      background-size: 100% 4px, 240px 100%, 100% 100%;
      mix-blend-mode: screen;
      opacity: 0.58;
    }

    .meter {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 6px;
      z-index: 3;
    }

    .meter-item {
      min-height: 42px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      border: 1px solid rgba(247, 201, 107, 0.16);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.06), transparent 50%),
        rgba(255,255,255,0.05);
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
      box-shadow: inset 0 0 20px rgba(111, 241, 255, 0.03);
    }

    .meter-item.selected {
      color: var(--ink);
      border-color: rgba(255, 213, 106, 0.78);
      background: linear-gradient(135deg, #ffe19a, var(--gold), #ff7fa0);
      box-shadow: 0 0 28px rgba(255, 213, 106, 0.32), inset 0 0 20px rgba(255,255,255,0.18);
    }

    .meter-item.active {
      color: var(--green);
      border-color: rgba(112, 255, 156, 0.32);
    }

    .touch {
      display: none;
      grid-template-columns: 1.08fr 0.96fr 0.96fr;
      gap: 10px;
      z-index: 4;
    }

    .pad {
      width: min(34vw, 132px);
      aspect-ratio: 1;
      justify-self: center;
      align-self: center;
      position: relative;
      border-radius: 999px;
      border: 1px solid rgba(247, 201, 107, 0.28);
      background:
        radial-gradient(circle at 38% 32%, rgba(255,255,255,0.16), transparent 18%),
        radial-gradient(circle at 50% 50%, rgba(111, 241, 255, 0.08), rgba(247, 201, 107, 0.08) 48%, rgba(0,0,0,0.28) 72%),
        rgba(8, 13, 24, 0.78);
      box-shadow:
        inset 0 0 26px rgba(0,0,0,0.42),
        0 10px 26px rgba(0,0,0,0.35),
        0 0 18px rgba(247, 201, 107, 0.12);
      touch-action: none;
    }

    .pad::before {
      content: "";
      position: absolute;
      inset: 18%;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: inset 0 0 20px rgba(111, 241, 255, 0.08);
    }

    .stick {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 44%;
      aspect-ratio: 1;
      border-radius: 999px;
      transform: translate(-50%, -50%);
      border: 1px solid rgba(255,255,255,0.24);
      background:
        radial-gradient(circle at 34% 26%, rgba(255,255,255,0.44), transparent 22%),
        linear-gradient(135deg, rgba(247,201,107,0.62), rgba(111,241,255,0.28)),
        #101827;
      box-shadow:
        inset 0 -8px 18px rgba(0,0,0,0.32),
        0 8px 20px rgba(0,0,0,0.34),
        0 0 18px rgba(111, 241, 255, 0.18);
      pointer-events: none;
    }

    .touch button {
      min-height: 46px;
      border-radius: 8px;
      border: 1px solid rgba(247, 201, 107, 0.22);
      background: linear-gradient(135deg, rgba(247, 201, 107, 0.12), rgba(111, 241, 255, 0.08));
      color: var(--text);
      font-weight: 900;
    }

    .touch .shot { color: var(--ink); background: linear-gradient(135deg, var(--cyan), var(--green)); }
    .touch .power {
      color: var(--ink);
      background: linear-gradient(135deg, #bffcff, var(--cyan), #8b7dff);
      box-shadow: 0 0 26px rgba(111, 241, 255, 0.22);
    }

    @media (max-width: 760px) {
      .app { padding: 8px; grid-template-rows: auto 1fr auto auto; }
      .topbar { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .hud { min-height: 46px; padding: 7px; }
      .hud strong { font-size: 15px; }
      .screen { width: 100%; }
      .meter { gap: 4px; }
      .meter-item { min-height: 35px; font-size: 9px; }
      .touch { display: grid; }
      .sound { min-height: 46px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="topbar" aria-label="status">
      <div class="hud"><span>SCORE</span><strong id="score">0</strong></div>
      <div class="hud"><span>HI-SCORE</span><strong id="hi">0</strong></div>
      <div class="hud"><span>LIVES</span><strong id="lives">3</strong></div>
      <div class="hud"><span>STAGE</span><strong id="stageText">1</strong></div>
      <button class="sound" id="soundBtn">SOUND OFF</button>
    </section>

    <section class="screen-wrap">
      <div class="screen" id="screen">
        <canvas id="game" width="960" height="540" aria-label="STAR ROUTE game"></canvas>
        <div class="crt"></div>
      </div>
    </section>

    <section class="meter" id="meter" aria-label="power meter"></section>

    <section class="touch" aria-label="mobile controls">
      <div class="pad" id="slidePad" aria-label="slide pad">
        <div class="stick" id="stick"></div>
      </div>
      <button class="shot" id="touchShot">SHOT</button>
      <button class="power" id="touchPower">POWER</button>
    </section>
  </main>

  <script>
    const W = 960, H = 540, GAME_H = 486;
    const POWER = ['SPEED', 'MISSILE', 'DOUBLE', 'LASER', 'OPTION', 'SHIELD'];
    const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
    const hitCircle = (a, b) => {
      const dx = a.x - b.x, dy = a.y - b.y;
      const r = (a.r || 10) + (b.r || 10);
      return dx * dx + dy * dy < r * r;
    };
    const hitRect = (a, b) => (
      a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y
    );

    class AudioManager {
      constructor(button) {
        this.button = button;
        this.ctx = null;
        this.master = null;
        this.loop = null;
        this.step = 0;
      }
      init() {
        const AC = window.AudioContext || window.webkitAudioContext;
        if (!AC) return false;
        if (!this.ctx) {
          this.ctx = new AC();
          this.master = this.ctx.createGain();
          this.master.gain.value = 0.26;
          this.master.connect(this.ctx.destination);
        }
        if (this.ctx.state === 'suspended') this.ctx.resume();
        return true;
      }
      tone(freq, dur, type = 'square', vol = 0.06, slide = 0) {
        if (!this.init()) return;
        const now = this.ctx.currentTime;
        const o = this.ctx.createOscillator();
        const g = this.ctx.createGain();
        o.type = type;
        o.frequency.setValueAtTime(freq, now);
        if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(20, slide), now + dur);
        g.gain.setValueAtTime(0.0001, now);
        g.gain.exponentialRampToValueAtTime(vol, now + 0.01);
        g.gain.exponentialRampToValueAtTime(0.0001, now + dur);
        o.connect(g); g.connect(this.master);
        o.start(now); o.stop(now + dur + 0.03);
      }
      noise(dur = 0.2, vol = 0.06) {
        if (!this.init()) return;
        const buffer = this.ctx.createBuffer(1, this.ctx.sampleRate * dur, this.ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
        const src = this.ctx.createBufferSource();
        const filter = this.ctx.createBiquadFilter();
        const g = this.ctx.createGain();
        filter.type = 'bandpass';
        filter.frequency.value = 850;
        g.gain.value = vol;
        src.buffer = buffer;
        src.connect(filter); filter.connect(g); g.connect(this.master);
        src.start();
      }
      start() {
        if (!this.init()) {
          this.button.textContent = 'NO AUDIO';
          return false;
        }
        if (this.loop) return true;
        const bass = [82,82,0,123,82,0,147,0,98,98,0,165,98,0,147,0];
        const lead = [659,784,880,988,880,784,740,659,523,587,659,740,659,587,523,494];
        const alarm = [1318,0,1174,0,988,0,1174,0];
        const tick = () => {
          const b = bass[this.step % bass.length];
          const l = lead[this.step % lead.length];
          const a = alarm[this.step % alarm.length];
          if (b) this.tone(b, 0.105, 'sawtooth', 0.07, b * 0.72);
          if (this.step % 2 === 0) this.tone(l, 0.06, 'square', 0.045, l * 1.18);
          if (a && this.step % 8 === 0) this.tone(a, 0.055, 'triangle', 0.032, a * 0.82);
          if (this.step % 4 === 2) this.noise(0.035, 0.018);
          this.step++;
        };
        tick();
        this.loop = setInterval(tick, 104);
        this.update();
        return true;
      }
      stop() {
        if (this.loop) clearInterval(this.loop);
        this.loop = null;
        this.update();
      }
      toggle() { this.loop ? this.stop() : this.start(); }
      update() {
        this.button.textContent = this.loop ? 'SOUND ON' : 'SOUND OFF';
        this.button.classList.toggle('on', !!this.loop);
      }
      shot(laser = false) { laser ? this.tone(720, .16, 'sawtooth', .07, 180) : this.tone(760, .06, 'square', .06, 420); }
      cannon() { this.tone(92, .28, 'sawtooth', .11, 48); this.tone(520, .22, 'square', .08, 180); this.noise(.2, .06); }
      capsule() { this.tone(620, .07, 'triangle', .06); this.tone(940, .08, 'triangle', .05); }
      power() { [420, 630, 840, 1260].forEach((n, i) => setTimeout(() => this.tone(n, .07, 'square', .05), i * 55)); }
      boom(big = false) { this.tone(big ? 90 : 150, big ? .45 : .2, 'sawtooth', big ? .1 : .07, 45); this.noise(big ? .45 : .22, big ? .1 : .07); }
      damage() { this.tone(180, .16, 'square', .09, 70); this.noise(.18, .08); }
      clear() { [523,659,784,1046,1318].forEach((n, i) => setTimeout(() => this.tone(n, .13, 'triangle', .06), i * 110)); }
    }

    class Bullet {
      constructor(x, y, vx, vy, team, kind = 'shot') {
        Object.assign(this, { x, y, vx, vy, team, kind, dead: false });
        this.r = kind === 'cannon' ? 26 : kind === 'laser' ? 9 : kind === 'missile' ? 7 : 5;
        this.w = kind === 'cannon' ? 420 : kind === 'laser' ? 154 : 14;
        this.h = kind === 'cannon' ? 46 : kind === 'laser' ? 9 : 8;
        this.life = kind === 'cannon' ? 0.9 : kind === 'laser' ? 0.42 : 3.8;
        this.pierce = kind === 'laser' || kind === 'cannon';
      }
      update(dt) {
        this.life -= dt;
        this.x += this.vx * dt;
        this.y += this.vy * dt;
        if (this.kind === 'missile') this.vy += 420 * dt;
        if (this.x < -80 || this.x > W + 180 || this.y < -80 || this.y > H + 80 || this.life <= 0) this.dead = true;
      }
      draw(ctx) {
        ctx.save();
        if (this.team === 'enemy') {
          ctx.fillStyle = '#ff9b3d'; ctx.shadowColor = '#ff9b3d'; ctx.shadowBlur = 10;
          ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2); ctx.fill();
        } else if (this.kind === 'cannon') {
          const grd = ctx.createLinearGradient(this.x, this.y, this.x + this.w, this.y);
          grd.addColorStop(0, 'rgba(255,255,255,0.98)');
          grd.addColorStop(0.18, '#bffcff');
          grd.addColorStop(0.55, '#6ff1ff');
          grd.addColorStop(1, 'rgba(111,241,255,0)');
          ctx.shadowColor = '#6ff1ff';
          ctx.shadowBlur = 34;
          ctx.fillStyle = grd;
          ctx.beginPath();
          if (ctx.roundRect) ctx.roundRect(this.x, this.y - this.h / 2, this.w, this.h, 23);
          else ctx.rect(this.x, this.y - this.h / 2, this.w, this.h);
          ctx.fill();
          ctx.fillStyle = 'rgba(255,255,255,0.95)';
          ctx.fillRect(this.x + 18, this.y - 6, this.w * 0.72, 12);
          ctx.strokeStyle = 'rgba(191,252,255,0.9)';
          ctx.lineWidth = 3;
          ctx.strokeRect(this.x + 8, this.y - this.h / 2 + 4, this.w * 0.82, this.h - 8);
        } else if (this.kind === 'laser') {
          ctx.fillStyle = '#cfffff'; ctx.shadowColor = '#6ff1ff'; ctx.shadowBlur = 18;
          ctx.fillRect(this.x, this.y - this.h / 2, this.w, this.h);
          ctx.fillStyle = '#6ff1ff'; ctx.fillRect(this.x + 4, this.y - 2, this.w - 8, 4);
        } else if (this.kind === 'missile') {
          ctx.fillStyle = '#ffd56a'; ctx.shadowColor = '#ffd56a'; ctx.shadowBlur = 12;
          ctx.beginPath(); ctx.moveTo(this.x + 12, this.y); ctx.lineTo(this.x - 8, this.y - 7); ctx.lineTo(this.x - 3, this.y); ctx.lineTo(this.x - 8, this.y + 7); ctx.closePath(); ctx.fill();
        } else {
          ctx.fillStyle = '#6ff1ff'; ctx.shadowColor = '#6ff1ff'; ctx.shadowBlur = 12;
          ctx.fillRect(this.x - 2, this.y - 3, 18, 6);
        }
        ctx.restore();
      }
    }

    class Particle {
      constructor(x, y, color, big = false) {
        this.x = x; this.y = y; this.color = color; this.big = big; this.life = big ? .95 : .55; this.max = this.life;
        const a = Math.random() * Math.PI * 2, s = (big ? 130 : 70) + Math.random() * (big ? 260 : 170);
        this.vx = Math.cos(a) * s; this.vy = Math.sin(a) * s; this.r = (big ? 3 : 2) + Math.random() * 4;
      }
      update(dt) { this.x += this.vx * dt; this.y += this.vy * dt; this.vx *= .97; this.vy *= .97; this.life -= dt; }
      draw(ctx) { ctx.globalAlpha = Math.max(0, this.life / this.max); ctx.fillStyle = this.color; ctx.fillRect(this.x, this.y, this.r, this.r); ctx.globalAlpha = 1; }
    }

    class PowerCapsule {
      constructor(x, y) { this.x = x; this.y = y; this.r = 12; this.vx = -145; this.phase = Math.random() * 6; this.dead = false; }
      update(dt) { this.x += this.vx * dt; this.phase += dt * 8; if (this.x < -30) this.dead = true; }
      draw(ctx) {
        ctx.save(); ctx.translate(this.x, this.y);
        ctx.fillStyle = Math.sin(this.phase) > 0 ? '#ff2f4f' : '#ffd56a';
        ctx.shadowColor = '#ff496d'; ctx.shadowBlur = 16;
        ctx.beginPath(); ctx.ellipse(0, 0, 16, 10, 0, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#fff'; ctx.fillRect(-5, -2, 10, 4);
        ctx.restore();
      }
    }

    class Player {
      constructor(game) { this.game = game; this.resetAll(); }
      resetAll() {
        this.x = 100; this.y = GAME_H / 2; this.r = 12; this.lives = 3; this.inv = 2; this.cool = 0; this.cannonCool = 0;
        this.speedLevel = 0; this.weapon = 'shot'; this.missile = false; this.optionCount = 0; this.shield = 0;
        this.history = []; this.options = [];
      }
      respawn() {
        this.x = 100; this.y = GAME_H / 2; this.inv = 2; this.cool = 0; this.cannonCool = 0;
        this.speedLevel = 0; this.weapon = 'shot'; this.missile = false; this.optionCount = 0; this.shield = 0;
        this.history = []; this.options = [];
      }
      update(dt) {
        const input = this.game.input;
        const sp = 220 + this.speedLevel * 52;
        this.x = clamp(this.x + input.x * sp * dt, 24, W - 35);
        this.y = clamp(this.y + input.y * sp * dt, 24, GAME_H - 24);
        this.cool -= dt; this.cannonCool -= dt; this.inv = Math.max(0, this.inv - dt);
        this.history.unshift({ x: this.x, y: this.y });
        this.history.length = 100;
        this.options = [];
        for (let i = 0; i < this.optionCount; i++) {
          const h = this.history[Math.min(this.history.length - 1, 18 + i * 18)] || { x: this.x - 30 * (i + 1), y: this.y };
          this.options.push({ x: h.x - 18, y: h.y + (i % 2 ? 12 : -12) });
        }
        if (input.shot) this.fire();
      }
      fire() {
        const laser = this.weapon === 'laser';
        const delay = laser ? .32 : .14;
        if (this.cool > 0) return;
        this.cool = delay;
        this.spawnShots(this.x + 22, this.y);
        for (const o of this.options) this.spawnShots(o.x + 16, o.y);
        this.game.audio.shot(laser);
      }
      spawnShots(x, y) {
        const bs = this.game.bullets;
        if (this.weapon === 'laser') bs.push(new Bullet(x, y, 0, 0, 'player', 'laser'));
        else if (this.weapon === 'double') {
          bs.push(new Bullet(x, y, 560, 0, 'player'));
          bs.push(new Bullet(x, y - 6, 490, -210, 'player'));
        } else bs.push(new Bullet(x, y, 560, 0, 'player'));
        if (this.missile) bs.push(new Bullet(x - 4, y + 15, 330, 120, 'player', 'missile'));
      }
      firePowerCannon() {
        if (this.cannonCool > 0 || this.game.state !== 'playing') return false;
        this.cannonCool = 1.05;
        this.game.bullets.push(new Bullet(this.x + 24, this.y, 360, 0, 'player', 'cannon'));
        for (const o of this.options) {
          this.game.bullets.push(new Bullet(o.x + 18, o.y, 330, 0, 'player', 'cannon'));
        }
        this.game.audio.cannon();
        this.game.flash('POWER CANNON', 0.45);
        return true;
      }
      damage() {
        if (this.inv > 0) return;
        if (this.shield > 0) { this.shield--; this.game.audio.damage(); return; }
        this.lives--; this.game.explode(this.x, this.y, '#ffd56a', true); this.game.audio.damage();
        if (this.lives < 0) this.game.gameOver();
        else this.respawn();
      }
      applyPower(name) {
        if (name === 'SPEED') this.speedLevel = Math.min(3, this.speedLevel + 1);
        if (name === 'MISSILE') this.missile = true;
        if (name === 'DOUBLE') this.weapon = 'double';
        if (name === 'LASER') this.weapon = 'laser';
        if (name === 'OPTION') this.optionCount = Math.min(2, this.optionCount + 1);
        if (name === 'SHIELD') this.shield = 3;
      }
      draw(ctx) {
        if (this.inv > 0 && Math.floor(this.inv * 12) % 2 === 0) return;
        ctx.save(); ctx.translate(this.x, this.y);
        ctx.shadowColor = '#6ff1ff'; ctx.shadowBlur = 16;
        ctx.fillStyle = '#6ff1ff';
        ctx.beginPath(); ctx.moveTo(24, 0); ctx.lineTo(-18, -16); ctx.lineTo(-6, 0); ctx.lineTo(-18, 16); ctx.closePath(); ctx.fill();
        ctx.fillStyle = '#eafcff'; ctx.fillRect(-3, -5, 18, 10);
        ctx.fillStyle = '#ffd56a'; ctx.beginPath(); ctx.moveTo(-19, -8); ctx.lineTo(-34 - Math.random() * 10, 0); ctx.lineTo(-19, 8); ctx.fill();
        ctx.fillStyle = '#70ff9c'; ctx.beginPath(); ctx.arc(6, 0, 4, 0, Math.PI * 2); ctx.fill();
        if (this.shield > 0) {
          ctx.strokeStyle = 'rgba(111,241,255,.78)'; ctx.lineWidth = 4; ctx.shadowBlur = 20;
          ctx.beginPath(); ctx.arc(21, 0, 25, -1.2, 1.2); ctx.stroke();
        }
        ctx.restore();
        for (const o of this.options) {
          ctx.save(); ctx.translate(o.x, o.y); ctx.fillStyle = '#ffd56a'; ctx.shadowColor = '#ffd56a'; ctx.shadowBlur = 12;
          ctx.beginPath(); ctx.arc(0, 0, 8, 0, Math.PI * 2); ctx.fill();
          ctx.fillStyle = '#070916'; ctx.fillRect(-4, -2, 8, 4); ctx.restore();
        }
      }
    }

    class Enemy {
      constructor(type, x, y, group = null) {
        Object.assign(this, { type, x, y, group, dead: false, t: 0, shot: 1 + Math.random() * 1.5 });
        this.r = type === 'mid' ? 24 : 14; this.hp = type === 'mid' ? 8 : 1; this.score = type === 'mid' ? 800 : type.includes('turret') ? 300 : 100;
        this.baseY = y;
      }
      update(dt, game) {
        this.t += dt; this.shot -= dt;
        if (this.type === 'wave') { this.x -= 170 * dt; this.y = this.baseY + Math.sin(this.t * 4) * 42; }
        if (this.type === 'runner') this.x -= 230 * dt;
        if (this.type === 'float') { this.x -= 90 * dt; this.y += Math.sin(this.t * 2.2) * 42 * dt; }
        if (this.type === 'mid') { this.x -= 80 * dt; this.y = this.baseY + Math.sin(this.t * 1.7) * 50; }
        if (this.type.includes('turret')) this.x -= game.scrollSpeed * dt;
        if (this.shot <= 0 && this.x < W - 40 && this.x > 90) { this.fire(game); this.shot = this.type === 'mid' ? .8 : 1.6; }
        if (this.x < -80) this.dead = true;
      }
      fire(game) {
        const dx = game.player.x - this.x, dy = game.player.y - this.y, len = Math.max(1, Math.hypot(dx, dy));
        game.bullets.push(new Bullet(this.x - 8, this.y, dx / len * 190, dy / len * 190, 'enemy'));
      }
      draw(ctx) {
        ctx.save(); ctx.translate(this.x, this.y); ctx.shadowBlur = 14;
        if (this.type.includes('turret')) {
          ctx.fillStyle = '#b7bdc9'; ctx.shadowColor = '#ff9b3d';
          ctx.fillRect(-14, -10, 28, 20); ctx.fillStyle = '#ff9b3d'; ctx.fillRect(-27, -3, 17, 6);
        } else if (this.type === 'mid') {
          ctx.fillStyle = '#ff496d'; ctx.shadowColor = '#ff496d';
          ctx.beginPath(); ctx.ellipse(0, 0, 34, 22, 0, 0, Math.PI * 2); ctx.fill();
          ctx.fillStyle = '#6ff1ff'; ctx.fillRect(-10, -5, 20, 10);
        } else {
          ctx.fillStyle = this.type === 'float' ? '#ffd56a' : '#ff496d'; ctx.shadowColor = ctx.fillStyle;
          ctx.beginPath(); ctx.moveTo(-16, 0); ctx.lineTo(14, -13); ctx.lineTo(8, 0); ctx.lineTo(14, 13); ctx.closePath(); ctx.fill();
          ctx.fillStyle = '#070916'; ctx.fillRect(-3, -3, 9, 6);
        }
        ctx.restore();
      }
    }

    class Boss {
      constructor() {
        this.x = W + 170; this.y = 240; this.hp = 90; this.dead = false; this.t = 0; this.phase = 0; this.r = 74;
        this.parts = [{x:-20,y:-70,hp:10},{x:-20,y:70,hp:10},{x:54,y:-42,hp:12},{x:54,y:42,hp:12}];
      }
      update(dt, game) {
        this.t += dt; this.x += (W - 150 - this.x) * dt * 0.7; this.y = 242 + Math.sin(this.t) * 42; this.phase -= dt;
        if (this.phase <= 0) {
          this.phase = this.hp < 35 ? .55 : .9;
          for (let i = -1; i <= 1; i++) game.bullets.push(new Bullet(this.x - 60, this.y + i * 24, -220, i * 65, 'enemy'));
          if (this.hp < 55) game.bullets.push(new Bullet(this.x - 30, this.y, -280, Math.sin(this.t) * 130, 'enemy', 'laser'));
        }
      }
      hit(b, game) {
        const beam = b.kind === 'laser' || b.kind === 'cannon';
        const beamBox = { x: b.x, y: b.y - b.h / 2, w: b.w, h: b.h };
        for (const p of this.parts) {
          if (p.hp <= 0) continue;
          const partBox = { x: this.x + p.x - 24, y: this.y + p.y - 20, w: 48, h: 40 };
          if (beam ? hitRect(beamBox, partBox) : hitCircle({x:this.x+p.x,y:this.y+p.y,r:24}, b)) { p.hp -= b.kind === 'cannon' ? 3 : 1; game.explode(this.x+p.x, this.y+p.y, '#ffd56a', false); return true; }
        }
        const coreBox = { x: this.x - 88, y: this.y - 34, w: 68, h: 68 };
        if (beam ? hitRect(beamBox, coreBox) : hitCircle({x:this.x-54,y:this.y,r:34}, b)) { this.hp -= b.kind === 'cannon' ? 4 : 1; game.explode(b.x, b.y, '#6ff1ff', false); if (this.hp <= 0) this.kill(game); return true; }
        return false;
      }
      kill(game) {
        this.dead = true; game.score += 10000; game.audio.boom(true); game.audio.clear();
        for (let i = 0; i < 80; i++) setTimeout(() => game.explode(this.x + Math.random()*130-80, this.y + Math.random()*160-80, i%2?'#ff496d':'#ffd56a', true), i * 18);
        setTimeout(() => game.clear(), 1500);
      }
      draw(ctx) {
        ctx.save(); ctx.translate(this.x, this.y); ctx.shadowColor = '#6ff1ff'; ctx.shadowBlur = 18;
        ctx.fillStyle = '#38445d'; ctx.fillRect(-88, -92, 160, 184);
        ctx.fillStyle = '#141c2d'; ctx.fillRect(-60, -62, 112, 124);
        const coreColor = this.hp < 30 ? '#ff496d' : this.hp < 60 ? '#ffd56a' : '#6ff1ff';
        ctx.fillStyle = coreColor; ctx.shadowColor = coreColor; ctx.beginPath(); ctx.arc(-48, 0, 28, 0, Math.PI*2); ctx.fill();
        for (const p of this.parts) if (p.hp > 0) { ctx.fillStyle = '#9da9bd'; ctx.fillRect(p.x-22, p.y-18, 44, 36); ctx.fillStyle = '#070916'; ctx.fillRect(p.x-9, p.y-4, 18, 8); }
        ctx.restore();
      }
    }

    class Game {
      constructor() {
        this.canvas = document.getElementById('game');
        this.ctx = this.canvas.getContext('2d');
        this.audio = new AudioManager(document.getElementById('soundBtn'));
        this.player = new Player(this);
        this.input = { x: 0, y: 0, shot: false };
        this.bullets = []; this.enemies = []; this.particles = []; this.capsules = []; this.boss = null;
        this.state = 'title'; this.score = 0; this.hi = Number(localStorage.getItem('starRouteHi') || 0);
        this.elapsed = 0; this.scroll = 0; this.scrollSpeed = 135; this.spawn = 0; this.meter = -1; this.groupSeq = 1;
        this.message = 'STAR ROUTE'; this.messageTime = 0; this.last = 0; this.clearBonus = 0;
        this.bind();
        this.renderMeter();
        this.updateHud();
        requestAnimationFrame(t => this.loop(t));
      }
      bind() {
        document.getElementById('soundBtn').onclick = () => this.audio.toggle();
        window.addEventListener('keydown', e => {
          if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)) e.preventDefault();
          if (e.code === 'Enter') this.start();
          if (e.code === 'KeyP' && this.state === 'playing') this.state = 'pause'; else if (e.code === 'KeyP' && this.state === 'pause') this.state = 'playing';
          if (e.code === 'KeyX') this.activatePowerButton();
          if (e.code === 'Space') this.input.shot = true;
          this.setKey(e.code, true);
        });
        window.addEventListener('keyup', e => { if (e.code === 'Space') this.input.shot = false; this.setKey(e.code, false); });
        document.getElementById('touchShot').onpointerdown = () => this.input.shot = true;
        document.getElementById('touchShot').onpointerup = () => this.input.shot = false;
        document.getElementById('touchPower').onclick = () => this.activatePowerButton();
        this.bindSlidePad();
        document.getElementById('screen').addEventListener('pointerdown', e => { if (this.state !== 'playing') this.start(); else this.input.shot = true; });
        document.getElementById('screen').addEventListener('pointerup', () => this.input.shot = false);
      }
      bindSlidePad() {
        const pad = document.getElementById('slidePad');
        const stick = document.getElementById('stick');
        const reset = () => {
          this.input.x = 0; this.input.y = 0;
          stick.style.transform = 'translate(-50%, -50%)';
          this.padPointer = null;
        };
        const move = e => {
          if (this.padPointer !== null && e.pointerId !== this.padPointer) return;
          const r = pad.getBoundingClientRect();
          const cx = r.left + r.width / 2;
          const cy = r.top + r.height / 2;
          const max = r.width * 0.28;
          let dx = e.clientX - cx;
          let dy = e.clientY - cy;
          const len = Math.hypot(dx, dy);
          if (len > max) { dx = dx / len * max; dy = dy / len * max; }
          this.input.x = Math.abs(dx) < 5 ? 0 : dx / max;
          this.input.y = Math.abs(dy) < 5 ? 0 : dy / max;
          stick.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
        };
        pad.addEventListener('pointerdown', e => {
          e.preventDefault();
          this.padPointer = e.pointerId;
          if (pad.setPointerCapture) pad.setPointerCapture(e.pointerId);
          move(e);
        });
        pad.addEventListener('pointermove', e => {
          if (this.padPointer === e.pointerId) {
            e.preventDefault();
            move(e);
          }
        });
        pad.addEventListener('pointerup', reset);
        pad.addEventListener('pointercancel', reset);
      }
      setKey(code, down) {
        this.keys = this.keys || {};
        this.keys[code] = down;
        this.input.x = (this.keys.ArrowRight || this.keys.KeyD ? 1 : 0) - (this.keys.ArrowLeft || this.keys.KeyA ? 1 : 0);
        this.input.y = (this.keys.ArrowDown || this.keys.KeyS ? 1 : 0) - (this.keys.ArrowUp || this.keys.KeyW ? 1 : 0);
      }
      start() {
        if (this.state === 'playing') return;
        this.audio.start();
        this.player.resetAll();
        Object.assign(this, { state:'playing', score:0, elapsed:0, scroll:0, spawn:0, bullets:[], enemies:[], particles:[], capsules:[], boss:null, meter:-1, clearBonus:0 });
        this.flash('STAGE 1', 2.2);
        this.updateHud();
        this.renderMeter();
      }
      flash(text, time = 1.3) { this.message = text; this.messageTime = time; }
      phase() { return this.boss ? 4 : this.elapsed < 35 ? 1 : this.elapsed < 75 ? 2 : this.elapsed < 110 ? 3 : 4; }
      terrainY(x) {
        const p = this.phase();
        if (p === 2) {
          const v = Math.sin((x + this.scroll) * .012) * 34 + Math.sin((x + this.scroll) * .026) * 15;
          return { top: 68 + v, bottom: GAME_H - 72 + v * .45 };
        }
        if (p === 3) {
          const gate = Math.sin((x + this.scroll) * .018) > .48 ? 70 : 0;
          return { top: 88 + gate, bottom: GAME_H - 90 - gate };
        }
        return null;
      }
      update(dt) {
        if (this.state !== 'playing') return;
        this.elapsed += dt; this.scroll += this.scrollSpeed * dt; this.messageTime = Math.max(0, this.messageTime - dt);
        if (this.phase() === 4 && !this.boss) { this.boss = new Boss(); this.flash('WARNING!! CORE GUARDIAN', 2.4); }
        if (!this.boss) this.spawnWave(dt); else this.boss.update(dt, this);
        this.player.update(dt);
        const ter = this.terrainY(this.player.x);
        if (ter && (this.player.y < ter.top + 16 || this.player.y > ter.bottom - 16)) this.player.damage();
        for (const a of [this.bullets, this.enemies, this.capsules, this.particles]) for (const o of a) o.update(dt, this);
        this.collisions();
        this.cleanup();
        this.updateHud();
      }
      spawnWave(dt) {
        this.spawn -= dt;
        if (this.spawn > 0) return;
        const p = this.phase();
        this.spawn = Math.max(.6, 1.25 - this.elapsed * .006);
        if (p === 1) {
          if (Math.random() < .55) this.addFormation(); else this.enemies.push(new Enemy('runner', W+30, 60 + Math.random()*330));
        } else if (p === 2) {
          this.enemies.push(new Enemy(Math.random()<.45?'turret':'float', W+30, Math.random()<.5 ? 100 : GAME_H-95));
          if (Math.random()<.35) this.enemies.push(new Enemy('wave', W+60, 90 + Math.random()*300, this.groupSeq++));
        } else {
          this.enemies.push(new Enemy(Math.random()<.45?'mid':'float', W+40, 95 + Math.random()*280));
          if (Math.random()<.35) this.enemies.push(new Enemy('turret', W+60, Math.random()<.5 ? 96 : GAME_H-96));
        }
      }
      addFormation() {
        const group = this.groupSeq++, y = 80 + Math.random() * 300;
        for (let i = 0; i < 5; i++) this.enemies.push(new Enemy('wave', W + i * 44, y + i * 8, group));
      }
      collisions() {
        for (const b of this.bullets) {
          if (b.team === 'player') {
            for (const e of this.enemies) {
              const beamHit = b.kind === 'laser' || b.kind === 'cannon';
              if (!e.dead && (beamHit ? hitRect({x:b.x,y:b.y-b.h/2,w:b.w,h:b.h}, {x:e.x-e.r,y:e.y-e.r,w:e.r*2,h:e.r*2}) : hitCircle(b,e))) {
                e.hp--; this.explode(b.x, b.y, '#6ff1ff', false); if (!b.pierce) b.dead = true;
                if (e.hp <= 0) this.killEnemy(e);
              }
            }
            if (this.boss && !this.boss.dead && this.boss.hit(b, this) && !b.pierce) b.dead = true;
          } else if (hitCircle(b, this.player)) { b.dead = true; this.player.damage(); }
        }
        for (const e of this.enemies) if (!e.dead && hitCircle(e, this.player)) { e.dead = true; this.player.damage(); }
        for (const c of this.capsules) if (!c.dead && hitCircle(c, this.player)) { c.dead = true; this.meter = (this.meter + 1) % POWER.length; this.audio.capsule(); this.renderMeter(); }
      }
      killEnemy(e) {
        e.dead = true; this.score += e.score; this.explode(e.x, e.y, e.type==='mid'?'#ff496d':'#ffd56a', e.type==='mid'); this.audio.boom(e.type==='mid');
        if (Math.random() < (e.group ? .32 : .16)) this.capsules.push(new PowerCapsule(e.x, e.y));
      }
      confirmPower() {
        if (this.state !== 'playing' || this.meter < 0) return;
        const name = POWER[this.meter]; this.player.applyPower(name); this.meter = -1; this.audio.power(); this.flash(name, .8); this.renderMeter();
      }
      activatePowerButton() {
        if (this.state !== 'playing') return;
        if (this.meter >= 0) this.confirmPower();
        this.player.firePowerCannon();
      }
      explode(x,y,color,big=false) { for (let i=0;i<(big?28:10);i++) this.particles.push(new Particle(x,y,color,big)); }
      cleanup() {
        this.bullets = this.bullets.filter(o => !o.dead);
        this.enemies = this.enemies.filter(o => !o.dead);
        this.capsules = this.capsules.filter(o => !o.dead);
        this.particles = this.particles.filter(o => o.life > 0);
      }
      gameOver() { this.state = 'gameover'; this.audio.boom(true); this.saveHi(); this.flash('GAME OVER', 999); }
      clear() { if (this.state !== 'playing') return; this.clearBonus = this.player.lives * 1000; this.score += this.clearBonus; this.state = 'clear'; this.saveHi(); this.flash('STAGE CLEAR', 999); }
      saveHi() { this.hi = Math.max(this.hi, this.score); localStorage.setItem('starRouteHi', String(this.hi)); this.updateHud(); }
      updateHud() {
        document.getElementById('score').textContent = this.score;
        document.getElementById('hi').textContent = this.hi;
        document.getElementById('lives').textContent = Math.max(0, this.player.lives);
        document.getElementById('stageText').textContent = this.phase();
        document.getElementById('screen').dataset.bullets = this.bullets.map(b => b.kind).join(',');
        document.getElementById('screen').dataset.input = `${this.input.x.toFixed(2)},${this.input.y.toFixed(2)}`;
      }
      renderMeter() {
        document.getElementById('meter').innerHTML = POWER.map((p,i) => `<div class="meter-item ${i===this.meter?'selected':''} ${this.isActive(p)?'active':''}">${p}</div>`).join('');
      }
      isActive(p) {
        return (p==='SPEED'&&this.player.speedLevel>0)||(p==='MISSILE'&&this.player.missile)||(p==='DOUBLE'&&this.player.weapon==='double')||(p==='LASER'&&this.player.weapon==='laser')||(p==='OPTION'&&this.player.optionCount>0)||(p==='SHIELD'&&this.player.shield>0);
      }
      drawBackground(ctx) {
        ctx.fillStyle = '#050712'; ctx.fillRect(0,0,W,H);
        for (let layer=0;layer<3;layer++) {
          const speed = [0.18,0.42,0.75][layer], count = [45,35,24][layer];
          ctx.fillStyle = layer===0 ? 'rgba(111,241,255,.32)' : layer===1 ? 'rgba(255,213,106,.34)' : 'rgba(255,255,255,.5)';
          for (let i=0;i<count;i++) {
            const x = (i*223 - this.scroll*speed) % (W+80);
            const y = (i*i*47 + layer*80) % GAME_H;
            ctx.fillRect(x<0?x+W+80:x, y, layer+1, layer+1);
          }
        }
      }
      drawTerrain(ctx) {
        const p = this.phase(); if (p < 2 || p > 3 || this.boss) return;
        ctx.fillStyle = p === 2 ? '#36131a' : '#202a39'; ctx.strokeStyle = p === 2 ? '#ff496d' : '#6ff1ff'; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(0,0);
        for (let x=0;x<=W;x+=12) ctx.lineTo(x,this.terrainY(x).top);
        ctx.lineTo(W,0); ctx.closePath(); ctx.fill(); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0,H);
        for (let x=0;x<=W;x+=12) ctx.lineTo(x,this.terrainY(x).bottom);
        ctx.lineTo(W,H); ctx.closePath(); ctx.fill(); ctx.stroke();
      }
      drawOverlay(ctx) {
        ctx.textAlign='center';
        if (this.state === 'title') {
          ctx.fillStyle='rgba(0,0,0,.52)'; ctx.fillRect(0,0,W,H);
          ctx.strokeStyle='rgba(247,201,107,.55)'; ctx.lineWidth=2;
          ctx.strokeRect(W/2-300, 128, 600, 172);
          ctx.strokeStyle='rgba(111,241,255,.22)'; ctx.strokeRect(W/2-286, 142, 572, 144);
          ctx.shadowColor='rgba(247,201,107,.45)'; ctx.shadowBlur=24;
          ctx.fillStyle='#fff7df'; ctx.font='900 74px system-ui'; ctx.fillText('STAR ROUTE', W/2, 194);
          ctx.shadowColor='rgba(111,241,255,.6)'; ctx.shadowBlur=18;
          ctx.fillStyle='#6ff1ff'; ctx.font='800 22px system-ui'; ctx.fillText('RETRO HORIZONTAL SHOOTER', W/2, 234);
          ctx.shadowBlur=0;
          ctx.fillStyle='#f7c96b'; ctx.font='900 18px system-ui'; ctx.fillText('Press Enter / Tap Start', W/2, 294);
          ctx.fillStyle='rgba(238,248,255,.78)'; ctx.font='14px system-ui'; ctx.fillText('Move: Arrow/WASD  Shot: Space  Power: X  Pause: P', W/2, 330);
          ctx.fillText('This is an original retro shooter inspired by classic arcade design.', W/2, 360);
        }
        if (this.state === 'pause') { ctx.fillStyle='rgba(0,0,0,.5)'; ctx.fillRect(0,0,W,H); ctx.fillStyle='#ffd56a'; ctx.font='900 54px system-ui'; ctx.fillText('PAUSE', W/2, H/2); }
        if (this.state === 'gameover' || this.state === 'clear') {
          ctx.fillStyle='rgba(0,0,0,.55)'; ctx.fillRect(0,0,W,H);
          ctx.fillStyle=this.state==='clear'?'#70ff9c':'#ff496d'; ctx.font='900 62px system-ui'; ctx.fillText(this.state==='clear'?'STAGE CLEAR':'GAME OVER', W/2, 205);
          ctx.fillStyle='#eef8ff'; ctx.font='800 24px system-ui'; ctx.fillText(`SCORE ${this.score}   HI ${this.hi}`, W/2, 260);
          if (this.state === 'clear') ctx.fillText(`BONUS ${this.clearBonus}`, W/2, 296);
          ctx.fillStyle='#ffd56a'; ctx.font='800 18px system-ui'; ctx.fillText('Press Enter / Tap Screen to Play Again', W/2, 344);
        }
        if (this.messageTime > 0 && this.state === 'playing') {
          ctx.fillStyle = this.message.includes('WARNING') ? '#ff496d' : '#ffd56a';
          ctx.font='900 34px system-ui'; ctx.fillText(this.message, W/2, 110);
        }
      }
      draw() {
        const ctx = this.ctx; ctx.clearRect(0,0,W,H); this.drawBackground(ctx); this.drawTerrain(ctx);
        for (const c of this.capsules) c.draw(ctx);
        for (const b of this.bullets) b.draw(ctx);
        for (const e of this.enemies) e.draw(ctx);
        if (this.boss && !this.boss.dead) this.boss.draw(ctx);
        this.player.draw(ctx);
        for (const p of this.particles) p.draw(ctx);
        ctx.globalAlpha = 1; this.drawOverlay(ctx);
      }
      loop(t) {
        const dt = Math.min(.033, (t - this.last) / 1000 || 0); this.last = t;
        this.update(dt); this.draw(); requestAnimationFrame(n => this.loop(n));
      }
    }
    new Game();
  </script>
</body>
</html>
